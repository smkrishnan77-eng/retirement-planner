<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020617;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
input[type=number]{-moz-appearance:textfield;width:100%}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.spin{animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}

#main-content{padding-bottom:80px}

<body>
<div id="root"></div>
<script>
const{createElement:h,useState,useCallback,useEffect,useRef,Fragment}=React;

/* ─── Formatters ─────────────────────────────────────────────────────────── */
const fmt=n=>!isFinite(n)||isNaN(n)?"$0":Math.abs(n)>=1e6?"$"+(n/1e6).toFixed(2)+"M":Math.abs(n)>=1e3?"$"+(n/1e3).toFixed(0)+"K":"$"+Math.round(n).toLocaleString();
const fmtPct=n=>(n*100).toFixed(1)+"%";
const fmtFull=n=>(n<0?"−":"")+"$"+Math.round(Math.abs(n)).toLocaleString();
const fmtP=n=>(n*100).toFixed(0)+"%";
const fmtDollar=n=>"$"+Math.round(Math.abs(n)).toLocaleString();

/* ─── Canvas charts ──────────────────────────────────────────────────────── */
function drawLineChart(canvas,R){
  if(!canvas||!R)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||700,H=canvas.offsetHeight||360;
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  const PAD={t:20,r:20,b:50,l:72};
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const allVals=[].concat(R.p5,R.p25,R.p50,R.p75,R.p95).filter(v=>isFinite(v)&&v>=0);
  const maxV=Math.max(...allVals)*1.05||1;
  const ages=R.chartLabels,n=ages.length;
  const xOf=i=>PAD.l+(i/(n-1))*cw;
  const yOf=v=>PAD.t+ch-(Math.min(v,maxV)/maxV)*ch;
  ctx.fillStyle="#0f172a";ctx.fillRect(0,0,W,H);
  const yTicks=5;
  ctx.textAlign="right";ctx.textBaseline="middle";ctx.font="10px system-ui";
  for(let i=0;i<=yTicks;i++){
    const v=(maxV/yTicks)*i,y=yOf(v);
    ctx.strokeStyle="rgba(30,41,59,1)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+cw,y);ctx.stroke();
    ctx.fillStyle="#64748b";
    const lbl=v>=1e6?"$"+(v/1e6).toFixed(1)+"M":v>=1e3?"$"+(v/1e3).toFixed(0)+"K":"$"+Math.round(v);
    ctx.fillText(lbl,PAD.l-6,y);
  }
  const step=Math.ceil(n/12);
  ctx.textAlign="center";ctx.textBaseline="top";
  for(let i=0;i<n;i+=step){
    const x=xOf(i);
    ctx.strokeStyle="rgba(30,41,59,1)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+ch);ctx.stroke();
    ctx.fillStyle="#64748b";ctx.font="10px system-ui";ctx.fillText(ages[i],x,PAD.t+ch+6);
  }
  ctx.fillStyle="#64748b";ctx.font="11px system-ui";ctx.textAlign="center";
  ctx.fillText("Age",PAD.l+cw/2,H-8);
  // 25-75 band
  ctx.beginPath();
  for(let i=0;i<n;i++){const x=xOf(i),y=yOf(R.p75[i]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  for(let i=n-1;i>=0;i--)ctx.lineTo(xOf(i),yOf(R.p25[i]));
  ctx.closePath();ctx.fillStyle="rgba(16,185,129,.1)";ctx.fill();
  function drawLine(data,color,width,dash){
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=width;ctx.setLineDash(dash||[]);
    for(let i=0;i<n;i++){const x=xOf(i),y=yOf(data[i]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.stroke();ctx.setLineDash([]);
  }
  drawLine(R.p95,"#6ee7b7",1.5,[6,4]);drawLine(R.p75,"#10b981",2);drawLine(R.p50,"#3b82f6",3);drawLine(R.p25,"#f59e0b",1.5);drawLine(R.p5,"#ef4444",1.5,[6,4]);
  // Retirement line
  const retI=ages.indexOf(R.retAge);
  if(retI>=0){
    const x=xOf(retI);
    ctx.strokeStyle="#f59e0b";ctx.lineWidth=2;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+ch);ctx.stroke();
    ctx.setLineDash([]);ctx.fillStyle="#f59e0b";ctx.font="bold 10px system-ui";
    ctx.textAlign="left";ctx.textBaseline="top";ctx.fillText("Retire ("+R.retAge+")",x+3,PAD.t+2);
  }
  // Recession lines
  (R.recAges||[]).forEach(function(a){
    const i=ages.indexOf(a);if(i<0)return;
    const x=xOf(i);
    ctx.strokeStyle="#ef4444";ctx.lineWidth=1.5;ctx.globalAlpha=.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+ch);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  });
  // Discharge lines (purple)
  (R.dischargeAges||[]).forEach(function(a){
    const i=ages.indexOf(a);if(i<0)return;
    const x=xOf(i);
    ctx.strokeStyle="#a855f7";ctx.lineWidth=2;ctx.setLineDash([5,3]);
    ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+ch);ctx.stroke();
    ctx.setLineDash([]);ctx.fillStyle="#a855f7";ctx.font="bold 10px system-ui";
    ctx.textAlign="left";ctx.textBaseline="top";ctx.fillText("🎁"+(a),x+3,PAD.t+18);
  });
  // Legend
  const legend=[["#6ee7b7","95th"],["#10b981","75th"],["#3b82f6","Median"],["#f59e0b","25th"],["#ef4444","5th"]];
  let lx=PAD.l;ctx.textBaseline="middle";ctx.font="10px system-ui";
  legend.forEach(function([c,l]){
    ctx.strokeStyle=c;ctx.lineWidth=2;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(lx,H-14);ctx.lineTo(lx+18,H-14);ctx.stroke();
    ctx.fillStyle="#94a3b8";ctx.textAlign="left";ctx.fillText(l,lx+22,H-14);lx+=52;
  });
}
function drawBarChart(canvas,data){
  if(!canvas||!data||!data.length)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||500,H=canvas.offsetHeight||180;
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  const PAD={t:10,r:10,b:40,l:44};
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  ctx.fillStyle="#0f172a";ctx.fillRect(0,0,W,H);
  const barW=cw/data.length*0.6,gap=cw/data.length;
  [0,25,50,75,100].forEach(function(v){
    const y=PAD.t+ch-(v/100)*ch;
    ctx.strokeStyle="rgba(30,41,59,1)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+cw,y);ctx.stroke();
    ctx.fillStyle="#64748b";ctx.font="9px system-ui";ctx.textAlign="right";ctx.textBaseline="middle";
    ctx.fillText(v+"%",PAD.l-4,y);
  });
  data.forEach(function(d,i){
    const v=+(d.sr*100).toFixed(1);
    const x=PAD.l+i*gap+gap/2-barW/2,barH=(v/100)*ch,y=PAD.t+ch-barH;
    ctx.fillStyle=d.sr>=.9?"rgba(16,185,129,.85)":d.sr>=.75?"rgba(245,158,11,.85)":"rgba(239,68,68,.85)";
    ctx.beginPath();ctx.roundRect?ctx.roundRect(x,y,barW,barH,4):ctx.rect(x,y,barW,barH);ctx.fill();
    ctx.fillStyle="white";ctx.font="bold 10px system-ui";ctx.textAlign="center";ctx.textBaseline="bottom";
    ctx.fillText(v.toFixed(0)+"%",x+barW/2,y-2);
    const short=d.label.replace("No Early Recession","No Recession").replace("Crash at ","");
    ctx.fillStyle="#94a3b8";ctx.font="9px system-ui";ctx.textBaseline="top";
    ctx.fillText(short,x+barW/2,PAD.t+ch+4);
  });
}
function drawDonut(canvas,td,at,re){
  if(!canvas)return;const total=td+at+re;if(total<=0)return;
  const dpr=window.devicePixelRatio||1;const S=canvas.offsetWidth||180;
  canvas.width=S*dpr;canvas.height=S*dpr;
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);ctx.clearRect(0,0,S,S);
  const cx=S/2,cy=S/2-10,r=S*0.34,inner=S*0.2;
  const slices=[{v:td,c:"#6366f1",l:"Tax-Def"},{v:at,c:"#10b981",l:"After-Tax"},{v:re,c:"#f59e0b",l:"RE"}].filter(s=>s.v>0);
  let angle=-Math.PI/2;
  slices.forEach(function(s){
    const sweep=(s.v/total)*2*Math.PI;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+sweep);ctx.closePath();ctx.fillStyle=s.c;ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,inner,0,2*Math.PI);ctx.fillStyle="#020617";ctx.fill();
    angle+=sweep;
  });
  ctx.fillStyle="white";ctx.font="bold 11px system-ui";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(fmt(total),cx,cy);
  let ly=cy+r+10;ctx.font="9px system-ui";ctx.textBaseline="top";
  slices.forEach(function(s){
    ctx.fillStyle=s.c;ctx.fillRect(cx-28,ly,8,8);ctx.fillStyle="#94a3b8";ctx.textAlign="left";
    ctx.fillText(s.l+" "+fmtP(s.v/total),cx-17,ly);ly+=13;
  });
}

/* ─── Monte Carlo — supports multiple discharge events ───────────────────── */
function runMC(p,nSims){
  nSims=nSims||1000;
  const{curAge,lifeAge,inflation,initPort,annContrib,contribGrowth,
    ssIncome,ssStartAge,retSpend,retAge,stockRet,bondRet,reEstRet,
    stockPre,stockRetAlloc,reEstPct,stdStock,stdBond,
    recEvery,recDrop,recRecov,earlyRec,dischargeEvents}=p;
  const ya=retAge-curAge,yd=lifeAge-retAge;
  if(ya<1||yd<1)return null;
  const T=ya+yd;
  const rand=function(){return Math.random();};
  const randn=function(){const u=Math.max(rand(),1e-10),v=rand();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
  const lp=1-reEstPct;
  const muA=lp*(stockPre*stockRet+(1-stockPre)*bondRet)+reEstPct*reEstRet;
  const sgA=lp*(stockPre*stdStock+(1-stockPre)*stdBond)*.95;
  const lr=Math.max(1-reEstPct*.5,.5);
  const muD=lr*(stockRetAlloc*stockRet+(1-stockRetAlloc)*bondRet)+(1-lr)*reEstRet;
  const sgD=lr*(stockRetAlloc*stdStock+(1-stockRetAlloc)*stdBond)*.9;
  const rs=new Array(T).fill("n");
  if(recEvery>0)for(var y=recEvery-1;y<T;y+=recEvery){rs[y]="d";if(y+1<T)rs[y+1]="r";}
  const edy=earlyRec==="y0"?0:earlyRec==="y1"?1:earlyRec==="y2"?2:-1;
  // Build discharge map: absYearIdx -> totalAmount (multiple events can map to same year)
  const dischargeMap={};
  const dischargeAges=[];
  (dischargeEvents||[]).forEach(function(ev){
    if(ev.amt>0&&ev.age>curAge&&ev.age<=lifeAge){
      const yr=ev.age-curAge;
      dischargeMap[yr]=(dischargeMap[yr]||0)+ev.amt;
      if(!dischargeAges.includes(ev.age))dischargeAges.push(ev.age);
    }
  });
  const yrly=[];for(var i=0;i<=T;i++)yrly.push([]);
  const par=[],pfin=[];var ruin=0;
  for(var s=0;s<nSims;s++){
    var port=initPort;yrly[0].push(port);
    for(var yr=0;yr<ya;yr++){
      var r;
      if(rs[yr]==="d")r=-(recDrop+.04*randn());
      else if(rs[yr]==="r")r=recRecov+sgA*Math.abs(randn())*.5;
      else r=muA+sgA*randn();
      port=Math.max(port*(1+r)+annContrib*Math.pow(1+contribGrowth,yr),0);
      if(dischargeMap[yr+1]!==undefined)port=Math.max(port-dischargeMap[yr+1],0);
      yrly[yr+1].push(port);
    }
    par.push(port);
    var ruined=false;
    for(var yr2=0;yr2<yd;yr2++){
      var absYr=ya+yr2,sc2=rs[absYr],r2;
      if(edy>=0&&yr2===edy)r2=-(recDrop+.03*randn());
      else if(edy>=0&&yr2===edy+1)r2=recRecov*.8+sgD*Math.abs(randn())*.4;
      else if(sc2==="d")r2=-(recDrop+.04*randn());
      else if(sc2==="r")r2=recRecov+sgD*Math.abs(randn())*.5;
      else r2=muD+sgD*randn();
      var sp=retSpend*Math.pow(1+inflation,yr2);
      var ss2=(retAge+yr2)>=ssStartAge?ssIncome*Math.pow(1+inflation,yr2):0;
      port=port*(1+r2)-Math.max(sp-ss2,0);
      if(dischargeMap[absYr]!==undefined)port=Math.max(port-dischargeMap[absYr],0);
      if(port<=0){port=0;ruined=true;}
      yrly[absYr+1].push(port);
    }
    pfin.push(port);if(ruined)ruin++;
  }
  const pct=function(arr,p){const s=arr.slice().sort(function(a,b){return a-b;});return s[Math.max(0,Math.floor(p/100*(s.length-1)))]||0;};
  const recAges=[];
  if(recEvery>0)for(var ry=recEvery-1;ry<T;ry+=recEvery)recAges.push(curAge+ry);
  if(edy>=0)recAges.push(retAge+edy);
  return{
    sr:1-ruin/nSims,ruin:ruin/nSims,
    par:{p5:pct(par,5),p25:pct(par,25),p50:pct(par,50),p75:pct(par,75),p95:pct(par,95)},
    pfin:{p5:pct(pfin,5),p25:pct(pfin,25),p50:pct(pfin,50),p75:pct(pfin,75),p95:pct(pfin,95)},
    recAges,dischargeAges,
    chartLabels:yrly.map(function(_,i){return curAge+i;}),
    p5:yrly.map(function(v){return Math.round(pct(v,5));}),
    p25:yrly.map(function(v){return Math.round(pct(v,25));}),
    p50:yrly.map(function(v){return Math.round(pct(v,50));}),
    p75:yrly.map(function(v){return Math.round(pct(v,75));}),
    p95:yrly.map(function(v){return Math.round(pct(v,95));}),
    retAge:retAge,
  };
}

/* ─── Scenario builder ──────────────────────────────────────────────────── */
function buildScen(p){
  const bl=(1-p.reEstPct)*(p.stockPre*p.stockRet+(1-p.stockPre)*p.bondRet)+p.reEstPct*p.reEstRet;
  const ya=Math.max(p.retAge-p.curAge,1);
  const pp=function(y){return y<=0?p.initPort:p.initPort*Math.pow(1+bl,y)+p.annContrib*(Math.pow(1+bl,y)-1)/bl;};
  const rL={none:"No Early Recession",y0:"Crash at Yr 1",y1:"Crash at Yr 2",y2:"Crash at Yr 3"};
  return{
    ret:[55,58,60,62,65,67,70].map(function(age){const port=pp(age-p.curAge),w4=port*.04;return{age,yrs:age-p.curAge,port,w4,sur:w4-p.retSpend,ok:w4>=p.retSpend,mine:age===p.retAge};}),
    spe:[60000,80000,100000,120000,150000,180000,250000].map(function(sp){const port=pp(ya),r4=sp/.04;return{sp,r4,port,sur:port-r4,ok:port>=r4,mine:sp===p.retSpend};}),
    inf:[.01,.02,.03,.04,.05,.06,.08].map(function(i){const ns=p.retSpend*Math.pow(1+i,ya),rr=bl-i,nest=ns/.04,w20=p.retSpend/Math.pow(1+i,20);return{inf:i,ns,rr,nest,w20,mine:Math.abs(i-p.inflation)<.001};}),
    con:[50000,100000,150000,200000,250000,300000,400000].map(function(c){const port=p.initPort*Math.pow(1+bl,ya)+c*(Math.pow(1+bl,ya)-1)/bl;return{c,port,sur:port-p.retSpend/.04,ok:port>=p.retSpend/.04,mine:c===p.annContrib};}),
    rec:["none","y0","y1","y2"].map(function(key){const r=runMC(Object.assign({},p,{earlyRec:key}),400);return{key,label:rL[key],sr:r?r.sr:0,med:r?r.par.p50:0,fin:r?r.pfin.p50:0,mine:key===p.earlyRec};}),
  };
}

/* ─── Excel Export — fully formatted with openpyxl-style styling via SheetJS ── */
function exportExcel(p,R,scen){
  if(typeof XLSX==="undefined"){alert("Excel library not loaded. Try again in a moment.");return;}
  if(!R){alert("Please run the simulation first before exporting.");return;}
  const WB=XLSX.utils.book_new();

  // ── colour helpers ──────────────────────────────────────────────────────
  const NAVY="1F3864",MIDBLUE="2E75B6",LTBLUE="D6E4F0";
  const GRN_BG="E2EFDA",AMB_BG="FFF2CC",RED_BG="FCE4D6",GRAY="F5F5F5";
  const WHITE="FFFFFF",BLUE_IN="0000FF",BLK="000000",DARKGREEN="375623";
  const PURPLE_BG="EAE4F7",PURPLE="7030A0";

  function fl(hex){return{patternType:"solid",fgColor:{rgb:hex}};}
  function fn(bold,color,sz){return{bold:!!bold,color:{rgb:color||BLK},sz:sz||11,name:"Arial"};}
  function al(h,wrap){return{horizontal:h||"left",vertical:"center",wrapText:!!wrap};}
  function bdr(){const s={style:"thin",color:{rgb:"BFBFBF"}};return{top:s,bottom:s,left:s,right:s};}
  function thickBdr(col){const s={style:"medium",color:{rgb:col||NAVY}};return{top:s,bottom:s,left:s,right:s};}

  function cell(v,bold,color,bg,sz,ha,nf,wrap){
    const c={v:v==null?"":v,t:typeof v==="number"?"n":"s"};
    const s={font:fn(bold,color,sz),fill:fl(bg||WHITE),alignment:al(ha,wrap),border:bdr()};
    if(nf)s.numFmt=nf;
    c.s=s;return c;
  }
  function hdrCell(v,bg,fg){
    return{v:v,t:"s",s:{font:{bold:true,color:{rgb:fg||WHITE},sz:10,name:"Arial"},fill:fl(bg||NAVY),alignment:al("center"),border:bdr()}};
  }
  function secCell(v,bg,span){
    return{v:v,t:"s",s:{font:{bold:true,color:{rgb:WHITE},sz:11,name:"Arial"},fill:fl(bg||MIDBLUE),alignment:al("left")},_span:span};
  }
  function numCell(v,nf,bold,bg){
    return{v:v==null?0:v,t:"n",s:{font:fn(bold,BLK,11),fill:fl(bg||WHITE),alignment:al("right"),border:bdr()},z:nf||"$#,##0"};
  }
  function pctCell(v,bold,bg){return numCell(v,bold?"0.0%":"0.0%",bold,bg);}
  function inp_c(v,nf){
    return{v:v,t:typeof v==="number"?"n":"s",
      s:{font:{bold:true,color:{rgb:BLUE_IN},sz:11,name:"Arial"},fill:fl("FFFF00"),alignment:al("right"),border:bdr()},
      z:nf||"$#,##0"};
  }
  function emptyRow(n){const r=[];for(let i=0;i<n;i++)r.push({v:"",t:"s",s:{fill:fl(WHITE),border:bdr()}});return r;}

  // ── Helper to write sheet from 2D array of cell objects ──────────────
  function buildSheet(rows,colWidths){
    const ws={};
    let maxC=0,maxR=rows.length;
    const merges=[];
    rows.forEach(function(row,ri){
      row.forEach(function(c,ci){
        if(!c)return;
        const addr=XLSX.utils.encode_cell({r:ri,c:ci});
        ws[addr]=c;
        if(c._span){
          merges.push({s:{r:ri,c:ci},e:{r:ri,c:ci+c._span-1}});
          for(let k=1;k<c._span;k++){
            const a2=XLSX.utils.encode_cell({r:ri,c:ci+k});
            ws[a2]={v:"",t:"s",s:{fill:fl(c.s.fill.fgColor.rgb||WHITE),border:bdr()}};
          }
        }
        maxC=Math.max(maxC,ci+1);
      });
    });
    ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:maxR-1,c:maxC-1}});
    ws['!merges']=merges;
    ws['!cols']=(colWidths||[]).map(function(w){return{wch:w};});
    ws['!rows']=rows.map(function(_,i){return{hpt:i===0?28:i===1?14:20};});
    return ws;
  }

/* ─── UI atoms ──────────────────────────────────────────────────────────── */
function Field({label,value,onChange,prefix,suffix,step,min,amber,big,note}){
  step=step||1;min=min||0;
  const[local,setLocal]=useState(String(value));
  useEffect(function(){setLocal(String(value));},[value]);
  const commit=function(v){const n=parseFloat(v);if(!isNaN(n))onChange(n);};
  return h("div",{style:{display:"flex",flexDirection:"column",gap:3,minWidth:0}},
    h("span",{style:{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,color:amber?"#fbbf24":"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},label),
    note&&h("span",{style:{fontSize:9,color:"#475569"}},note),
    h("div",{style:{display:"flex",alignItems:"center",borderRadius:10,border:"1px solid "+(amber?"rgba(251,191,36,.7)":"rgba(71,85,105,.5)"),background:"#0f172a",overflow:"hidden",boxShadow:amber?"0 0 0 2px rgba(251,191,36,.1)":"none"}},
      prefix&&h("span",{style:{padding:"0 8px",color:"#64748b",fontSize:12,borderRight:"1px solid #1e293b",flexShrink:0,lineHeight:"34px"}},prefix),
      h("input",{type:"number",value:local,step:step,min:min,
        onChange:function(e){setLocal(e.target.value);},
        onBlur:function(e){commit(e.target.value);setLocal(String(parseFloat(e.target.value)||value));},
        onKeyDown:function(e){if(e.key==="Enter")commit(e.target.value);},
        style:{flex:1,minWidth:0,padding:big?"10px 8px":"6px 8px",background:"transparent",border:"none",outline:"none",color:"white",fontWeight:600,fontSize:big?20:13,textAlign:"right"}}),
      suffix&&h("span",{style:{padding:"0 8px",color:"#64748b",fontSize:12,borderLeft:"1px solid #1e293b",flexShrink:0,lineHeight:"34px"}},suffix)
    )
  );
}
function KPI({label,value,sub,color}){
  color=color||"blue";
  const bg={blue:"linear-gradient(135deg,#1d4ed8,#1e40af)",green:"linear-gradient(135deg,#059669,#047857)",red:"linear-gradient(135deg,#dc2626,#b91c1c)",amber:"linear-gradient(135deg,#d97706,#b45309)",purple:"linear-gradient(135deg,#7c3aed,#6d28d9)"}[color]||"linear-gradient(135deg,#1d4ed8,#1e40af)";
  return h("div",{style:{background:bg,borderRadius:16,padding:14,color:"white",boxShadow:"0 4px 16px rgba(0,0,0,.4)"}},
    h("div",{style:{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,opacity:.7,marginBottom:3}},label),
    h("div",{style:{fontWeight:900,fontSize:20,lineHeight:1.2}},value),
    sub&&h("div",{style:{fontSize:10,opacity:.6,marginTop:3}},sub)
  );
}
function AssetSection({accent,rgb,title,note,sub1Label,sub1,onSub1,sub2Label,sub2,onSub2,mk}){
  return h("div",{style:{background:"rgba("+rgb+",.07)",border:"1px solid rgba("+rgb+",.3)",borderRadius:16,padding:14}},
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
      h("span",{style:{color:accent,fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:1.2}},title),

      h(Field,{label:sub1Label,value:sub1,onChange:function(v){mk(onSub1)(v);},prefix:"$",step:5000,min:0}),

  );
}
function LineCanvas({results}){
  const ref=useRef(null);
  useEffect(function(){if(ref.current&&results)setTimeout(function(){drawLineChart(ref.current,results);},10);},[results]);
  useEffect(function(){function onResize(){if(ref.current&&results)drawLineChart(ref.current,results);}window.addEventListener("resize",onResize);return function(){window.removeEventListener("resize",onResize);};},[results]);
  return h("div",{style:{width:"100%",height:360}},h("canvas",{ref:ref,style:{width:"100%",height:"100%"}}));
}
function BarCanvas({data}){
  const ref=useRef(null);
  useEffect(function(){if(ref.current&&data)setTimeout(function(){drawBarChart(ref.current,data);},10);},[data]);
  return h("div",{style:{width:"100%",height:200}},h("canvas",{ref:ref,style:{width:"100%",height:"100%"}}));
}
function DonutCanvas({td,at,re}){
  const ref=useRef(null);
  useEffect(function(){if(ref.current)setTimeout(function(){drawDonut(ref.current,td,at,re);},10);},[td,at,re]);
  return h("div",{style:{width:"100%",height:200}},h("canvas",{ref:ref,style:{width:"100%",height:"100%"}}));
}

            background:stale?"linear-gradient(135deg,#d97706,#ea580c)":"linear-gradient(135deg,#2563eb,#4f46e5)",
            boxShadow:"0 4px 20px rgba(0,0,0,.5)",opacity:running?.65:1}},
          running
            ?h("span",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:8}},
                h("svg",{className:"spin",width:18,height:18,viewBox:"0 0 24 24",fill:"none"},
                  h("circle",{cx:12,cy:12,r:10,stroke:"white",strokeWidth:4,strokeOpacity:.25}),
                  h("path",{fill:"white",d:"M4 12a8 8 0 018-8v8H4z"})
                ),"Running 1,000 scenarios…")
            :stale?"⚠️  Assumptions changed — click to Re-Simulate":"🎲  Run Monte Carlo Simulation  (1,000 scenarios)"
        ),
        h("button",{onClick:function(){exportExcel(buildP(),results,scen);},
          style:{padding:"13px 18px",borderRadius:14,background:"rgba(16,185,129,.15)",border:"1px solid rgba(16,185,129,.35)",color:"#6ee7b7",fontWeight:700,fontSize:13,whiteSpace:"nowrap"}},
          "📥 Export Excel"
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
